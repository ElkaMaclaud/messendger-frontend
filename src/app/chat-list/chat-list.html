<ul class="chat-list">
  @for (chat of chats; track chat.id) {
    <li>
      <button
        type="button"
        class="chat-item"
        [class.active]="chat.id === selectedChatId()"
        (click)="selectChat(chat.id)"
      >
        <span class="chat-name">{{ chat.name }}</span>
        <span class="chat-last-message">{{ chat.lastMessage }}</span>
      </button>
    </li>
  }
</ul>
